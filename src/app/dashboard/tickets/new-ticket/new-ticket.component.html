<form (ngSubmit)="onSubmit(titleInput , textInput )" #form>
  <app-control >
    <label>Title</label>
    <input name="title" id="title" [(ngModel)]="titleInput"/>
  </app-control>
  <app-control   >
    <label>Request</label>
    <textarea name="request" id="request" rows="3" [(ngModel)]="textInput" ></textarea>
  </app-control>
  <p>
    <button appButton>
      Submit
      <span class="icon">⌲</span>
    </button>
  </p>
</form>
